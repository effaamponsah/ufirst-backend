[alembic]
script_location = migrations
prepend_sys_path = .

# Migration file naming: timestamp + slug
# e.g. 20260318_1430_wallet_add_ob_payments.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Omit revision identifiers from autogenerate — use the file template above
truncate_slug_length = 60

# All migrations live in a single versions directory.
# Name each migration with its module prefix: "wallet: add ob_payments table"
version_locations = migrations/versions

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
