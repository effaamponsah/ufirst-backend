services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ufirst
      POSTGRES_USER: ufirst
      POSTGRES_PASSWORD: ufirst
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_schemas.sql:/docker-entrypoint-initdb.d/01_init_schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ufirst"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
